<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 420" width="1000" height="420" preserveAspectRatio="xMidYMid meet" style="max-width:100%;height:auto;" role="img" aria-label="Module 3 — agent rewrites its own system prompt">
  <title>Module 3 — Self-modifying prompt</title>
  <defs>
    <linearGradient id="m3-bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#0f1729"/><stop offset="1" stop-color="#1a2744"/></linearGradient>
    <linearGradient id="m3-g" x1="0" y1="0" x2="1" y2="0"><stop offset="0" stop-color="#ff6b9d"/><stop offset="1" stop-color="#c77dff"/></linearGradient>
    <marker id="m3-a" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto"><path d="M0 0 L10 5 L0 10 z" fill="#c77dff"/></marker>
  </defs>
  <rect width="1000" height="420" fill="url(#m3-bg)"/>
  <text x="500" y="42" text-anchor="middle" fill="#fff" font-family="system-ui,sans-serif" font-size="26" font-weight="700">Self-modifying · agent rewrites its own prompt</text>
  <text x="500" y="68" text-anchor="middle" fill="#8fa3c7" font-family="system-ui,sans-serif" font-size="15">Persisted to disk · survives restart · behavior change is permanent</text>

  <g font-family="system-ui,sans-serif">
    <!-- Before -->
    <g transform="translate(40,105)">
      <rect width="290" height="270" rx="14" fill="#1e2a4a" stroke="#3b4670" stroke-width="1.5"/>
      <text x="145" y="32" text-anchor="middle" fill="#8fa3c7" font-size="13" font-weight="700" letter-spacing="1.5">BEFORE · .prompt file</text>
      <g transform="translate(16,58)" font-family="ui-monospace,monospace" font-size="13">
        <rect width="258" height="195" rx="8" fill="#0b1020" stroke="#2a3660"/>
        <text x="14" y="26" fill="#fff">You are a helpful</text>
        <text x="14" y="46" fill="#fff">assistant. Be concise.</text>
        <text x="14" y="88" fill="#8fa3c7">&gt; tell me about AWS</text>
        <text x="14" y="120" fill="#61afef">💬 AWS is Amazon Web</text>
        <text x="14" y="140" fill="#61afef">   Services, a cloud</text>
        <text x="14" y="160" fill="#61afef">   computing platform...</text>
        <text x="14" y="184" fill="#8fa3c7" font-size="12">(normal prose)</text>
      </g>
    </g>

    <!-- Arrow with @tool system_prompt -->
    <g transform="translate(340,155)">
      <rect width="320" height="160" rx="12" fill="#2a1e4a" stroke="url(#m3-g)" stroke-width="2.5"/>
      <text x="160" y="32" text-anchor="middle" fill="#c77dff" font-size="13" font-weight="700" letter-spacing="1.5">@tool system_prompt</text>
      <text x="160" y="62" text-anchor="middle" fill="#fff" font-size="16" font-weight="700">"respond only in haiku"</text>
      <g font-family="ui-monospace,monospace" font-size="13">
        <text x="18" y="92" fill="#8fa3c7">system_prompt(</text>
        <text x="30" y="112" fill="#fff">action=<tspan fill="#98c379">"update"</tspan>,</text>
        <text x="30" y="132" fill="#fff">prompt=<tspan fill="#98c379">"haiku mode"</tspan></text>
        <text x="18" y="152" fill="#8fa3c7">)  # writes .prompt</text>
      </g>
    </g>

    <!-- arrows -->
    <g stroke="url(#m3-g)" stroke-width="3.5" fill="none" marker-end="url(#m3-a)">
      <path d="M335 240 L385 240"/>
      <path d="M660 240 L710 240"/>
    </g>

    <!-- After -->
    <g transform="translate(670,105)">
      <rect width="290" height="270" rx="14" fill="#1e2a4a" stroke="url(#m3-g)" stroke-width="2.5"/>
      <text x="145" y="32" text-anchor="middle" fill="#c77dff" font-size="13" font-weight="700" letter-spacing="1.5">AFTER · next run</text>
      <g transform="translate(16,58)" font-family="ui-monospace,monospace" font-size="13">
        <rect width="258" height="195" rx="8" fill="#0b1020" stroke="#2a3660"/>
        <text x="14" y="26" fill="#fff">Respond in haiku.</text>
        <text x="14" y="68" fill="#8fa3c7">&gt; tell me about AWS</text>
        <text x="14" y="100" fill="#c77dff">💬 Cloud machines awake</text>
        <text x="14" y="120" fill="#c77dff">   Servers hum in halls</text>
        <text x="14" y="140" fill="#c77dff">   AWS serves all</text>
        <text x="14" y="180" fill="#00ff88" font-weight="600">✓ learned &amp; persisted</text>
      </g>
    </g>

    <!-- pulse animation -->
    <circle r="6" fill="#c77dff">
      <animateMotion dur="5s" repeatCount="indefinite" path="M335 240 L500 240 L660 240 L710 240"/>
      <animate attributeName="opacity" values="0;1;1;1;0" dur="5s" repeatCount="indefinite"/>
    </circle>
  </g>
</svg>